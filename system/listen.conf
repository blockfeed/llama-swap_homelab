# =============================================================================
# llama-swap Systemd Override: Network Listen Address
# =============================================================================
# Purpose: Override the default localhost-only binding to expose the service
#          on the LAN so remote clients (e.g. Open WebUI, mobile apps) can
#          reach the inference API without SSH tunneling.
#
# Deployment:
#   Copy or symlink to: /etc/systemd/system/llama-swap.service.d/listen.conf
#   Then: sudo systemctl daemon-reload && sudo systemctl restart llama-swap
#
# Rollback:
#   Remove the file and daemon-reload. The base unit falls back to
#   127.0.0.1:12434 (localhost only).
#
# Security:
#   Bind to a specific LAN IP rather than 0.0.0.0 to limit exposure.
#   Pair with firewall rules restricting port 12434 to known client IPs.
# =============================================================================

[Service]
# Clear the ExecStart from the base unit file first (systemd override requirement).
ExecStart=

# Bind to LAN IP. Replace <LAN_IP> with the host's network interface address.
# -watch-config enables hot-reload when config.yaml changes (no restart needed
# for adding/removing models, only for changing global settings or macros).
ExecStart=/usr/bin/llama-swap -config /etc/llama-swap/config.yaml -watch-config -listen <LAN_IP>:12434
