# =============================================================================
# llama-swap Systemd Override: Network Listen Address
# =============================================================================
# Purpose: Override default localhost binding to enable network access
# Version: 1.0
# Updated: 2026-04-13
# Maintainer: Infrastructure Team
#
# Deployment:
#   Copy or symlink to: /etc/systemd/system/llama-swap.service.d/listen.conf
#   Then: sudo systemctl daemon-reload && sudo systemctl restart llama-swap
#
# Security:
#   - Binds to specific IP (<LAN_IP>), not 0.0.0.0
#   - Local network access only (not internet-exposed)
#   - Configure firewall rules to restrict client access
# =============================================================================

[Service]
# Clear the ExecStart from the main unit file (required for override)
ExecStart=

# Override with production listen address
# Arguments:
#   -config /etc/llama-swap/config.yaml  : Model routing configuration
#   -watch-config                        : Enable hot-reload on config changes
#   -listen <LAN_IP>:12434              : Bind to network IP (not localhost)
ExecStart=/usr/bin/llama-swap -config /etc/llama-swap/config.yaml -watch-config -listen <LAN_IP>:12434
