# =============================================================================
# llama-swap Systemd Override: GPU Power Management (SCLK Max)
# =============================================================================
# Purpose: Set GPU SCLK max before llama-swap starts for optimal inference
# Version: 1.2
# Updated: 2026-04-25
# Maintainer: Infrastructure Team
#
# NOTE: gpu-max-mhz.sh dependency REMOVED - script lives outside repo.
#
# Deployment:
#   Copy or symlink to: /etc/systemd/system/llama-swap.service.d/gpu-power.conf
#   Then: sudo systemctl daemon-reload && sudo systemctl restart llama-swap
#
# Execution flow:
#   1. ExecStart=/usr/bin/llama-swap ...                  (runs directly)
#
# Start llama-swap with network access and config watching
# =============================================================================

[Service]
# Must clear and re-specify ExecStart when using ExecStartPre for overrides
ExecStart=
ExecStart=/usr/bin/llama-swap -config /etc/llama-swap/config.yaml -watch-config -listen <host-ip>:12434
