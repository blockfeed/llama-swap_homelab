# =============================================================================
# systemd-nspawn@llama-container Drop-In: llama-swap Dependency
# =============================================================================
# Purpose: Tie the container lifecycle to the host llama-swap.service
# Version: 1.0
# Maintainer: Infrastructure Team
#
# BindsTo creates a hard dependency:
#   - When llama-swap.service starts, this unit starts
#   - When llama-swap.service stops, this unit stops (even if other refs exist)
#   - If this unit fails, llama-swap.service is unaffected (one-way)
#
# After ensures ordering: llama-swap starts before the container.
#
# This is intentional: the container is an extension of llama-swap for
# running isolated tooling (benchmarking, test harnesses, etc.) and should
# not exist without the inference service it depends on.
#
# Deployment:
#   sudo mkdir -p /etc/systemd/system/systemd-nspawn@llama-container.service.d/
#   sudo cp llama-swap-dep.conf /etc/systemd/system/systemd-nspawn@llama-container.service.d/
#   sudo systemctl daemon-reload
# =============================================================================

[Unit]
BindsTo=llama-swap.service
After=llama-swap.service
