# =============================================================================
# systemd-nspawn@llama-container Drop-In: GPU Device Access
# =============================================================================
# Purpose: Grant the container access to AMD ROCm GPU devices
# Version: 1.0
# Maintainer: Infrastructure Team
#
# AMD ROCm requires two device files for GPU compute:
#   /dev/kfd          — Kernel Fusion Driver (compute access)
#   /dev/dri/renderD128 — AMDGPU render node (DRM)
#
# Both DeviceAllow (cgroup access control) and BindPaths (mount into container)
# are required. Without DeviceAllow, systemd inside the container will deny
# access even though the device is bind-mounted.
#
# GPU GROUP (GID):
#   On the host, /dev/kfd and /dev/dri/renderD128 belong to group 'render'
#   with GID 993. Inside the container, create the same group and add the
#   SSH user to it:
#     groupadd --force --gid 993 render
#     usermod -aG render <username>
#
# Deployment:
#   sudo mkdir -p /etc/systemd/system/systemd-nspawn@llama-container.service.d/
#   sudo cp gpu.conf /etc/systemd/system/systemd-nspawn@llama-container.service.d/
#   sudo systemctl daemon-reload
# =============================================================================

[Service]
DeviceAllow=/dev/kfd rw
DeviceAllow=/dev/dri/renderD128 rw
BindPaths=/dev/kfd:/dev/kfd
BindPaths=/dev/dri/renderD128:/dev/dri/renderD128
